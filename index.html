<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Event Check-in</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.9.1/font/bootstrap-icons.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #212529; color: #f8f9fa; }
    #qr-reader { width: 100%; max-width: 500px; box-sizing: border-box; margin: 0 auto; background: white; border-radius: 8px; overflow: hidden; color: black; }
  </style>
</head>
<body>
  <nav class="navbar sticky-top navbar-dark bg-primary">
    <div class="container-fluid">
      <span class="navbar-brand mx-auto"><i class="bi bi-qr-code-scan"></i> Event Check-in</span>
    </div>
  </nav>
  
  <div class="container mt-4">
    <div id="qr-reader"></div>
    <div id="qr-reader-results" class="mt-3 text-center fs-5 fw-bold"></div>
    
    <form id="CheckinForm" class="mt-4" style="max-width: 500px; margin: 0 auto;">
      
      <!-- Session Dropdown -->
      <div class="mb-3 input-group input-group-lg">
        <span class="input-group-text bg-primary text-white"><i class="bi bi-calendar-event"></i></span>
        <select class="form-select" id="sessionData" required>
          <option value="" disabled selected>Select Session...</option>
          <option value="Morning Welcome">Morning Welcome</option>
          <option value="Main Workshop">Main Workshop</option>
          <option value="Afterparty">Afterparty</option>
        </select>
      </div>

      <!-- Attendee Data (QR Result) -->
      <div class="mb-3 input-group input-group-lg">
        <span class="input-group-text bg-primary text-white"><i class="bi bi-person-badge"></i></span>
        <input type="text" class="form-control" id="attendeeData" placeholder="Awaiting scan..." readonly required>
      </div>
      
      <button type="submit" class="btn btn-success btn-lg w-100" id="submitBtn" disabled>Check In Attendee</button>
    </form>
  </div>

  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <script>
    // ⚠️ REPLACE THIS LINK WITH YOUR APPS SCRIPT /exec URL ⚠️
    const API_URL = "https://script.google.com/macros/s/AKfycbzCl2zDWSB3Fh5ElhfFoB0iCFxrY6oITYiZChsOUD2O2GK5PpbAIq5QtjHkNTH2H5hX/exec"; 
    
    let lastResult = ""; 

    document.addEventListener("DOMContentLoaded", function() {
        const resultContainer = document.getElementById('qr-reader-results');
        const attendeeInput = document.getElementById("attendeeData");
        const submitBtn = document.getElementById("submitBtn");
        
        // Initialize the scanner
        const html5QrcodeScanner = new Html5QrcodeScanner("qr-reader", { fps: 10, qrbox: 250 });
        
        function onScanSuccess(decodedText) {
            if (decodedText !== lastResult) {
                lastResult = decodedText; 
                resultContainer.innerHTML = `<span class="text-success">Code Captured!</span>`;
                attendeeInput.value = decodedText;
                
                submitBtn.disabled = false;
                submitBtn.classList.remove("btn-success");
                submitBtn.classList.add("btn-primary");
            }
        }
        
        html5QrcodeScanner.render(onScanSuccess);

        // Handle the Form Submit
        document.getElementById('CheckinForm').addEventListener('submit', function(e) {
          e.preventDefault();
          
          if (API_URL === "YOUR_WEB_APP_URL_HERE") {
              alert("Wait! You forgot to paste your Google Apps Script URL into the code.");
              return;
          }
          
          submitBtn.innerHTML = '<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span> Sending...';
          submitBtn.disabled = true;

          const payload = {
            session: document.getElementById('sessionData').value,
            qr_data: attendeeInput.value
          };

          fetch(API_URL, {
            method: 'POST',
            body: JSON.stringify(payload),
            headers: { 'Content-Type': 'text/plain;charset=utf-8' }
          })
          .then(response => response.json())
          .then(data => {
            resultContainer.innerHTML = `<span class="text-info">Scan #${data.order} Saved. Ready for next.</span>`;
            
            // Keep the selected session
            const currentSession = document.getElementById('sessionData').value;
            document.getElementById('CheckinForm').reset();
            document.getElementById('sessionData').value = currentSession;
            
            submitBtn.innerHTML = "Check In Attendee";
            lastResult = ""; 
          })
          .catch(error => {
            console.error("Fetch error:", error);
            alert("Error connecting to Google Sheets! Check the console for details.");
            submitBtn.innerHTML = "Check In Attendee";
            submitBtn.disabled = false;
          });
        });
    });
  </script>
</body>
</html>
