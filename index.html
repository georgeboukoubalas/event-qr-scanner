<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ESN Event Scanner</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.9.1/font/bootstrap-icons.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #212529; color: #f8f9fa; }
    #qr-reader { width: 100%; max-width: 500px; box-sizing: border-box; margin: 0 auto; background: white; border-radius: 8px; overflow: hidden; color: black; }
  </style>
</head>
<body>
  <nav class="navbar sticky-top navbar-dark bg-primary">
    <div class="container-fluid">
      <span class="navbar-brand mx-auto"><i class="bi bi-qr-code-scan"></i> Event Check-in</span>
    </div>
  </nav>
  
  <div class="container mt-4">
    <div id="qr-reader"></div>
    <div id="qr-reader-results" class="mt-3 text-center fs-5 fw-bold"></div>
    
    <form id="CheckinForm" class="mt-4" style="max-width: 500px; margin: 0 auto;">
      <div class="mb-3 input-group input-group-lg">
        <span class="input-group-text bg-primary text-white"><i class="bi bi-calendar3"></i></span>
        <select class="form-select" id="dayData" required>
          <option value="" disabled selected>Select Sheet...</option>
          <option value="Day 1">Day 1</option>
          <option value="Day 2">Day 2</option>
          <option value="Day 3">Day 3</option>
          <option value="lefts">lefts (Exits)</option>
        </select>
      </div>

      <div class="mb-3 input-group input-group-lg">
        <span class="input-group-text bg-primary text-white"><i class="bi bi-clock"></i></span>
        <select class="form-select" id="sessionData" required>
          <option value="" disabled selected>Select Scan Phase...</option>
          <option value="1st scan">1st scan (Lines 2-70)</option>
          <option value="2nd scan">2nd scan (Lines 80-150)</option>
          <option value="3rd scan">3rd scan (Lines 160-240)</option>
        </select>
      </div>

      <div class="mb-3 input-group input-group-lg">
        <span class="input-group-text bg-primary text-white"><i class="bi bi-person-badge"></i></span>
        <input type="text" class="form-control" id="attendeeData" placeholder="Awaiting scan..." readonly required>
      </div>
      
      <button type="submit" class="btn btn-success btn-lg w-100" id="submitBtn" disabled>Check In Attendee</button>
    </form>
  </div>

  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <script>
    // ⚠️ REPLACE WITH YOUR NEW URL ⚠️
    const API_URL = "https://script.google.com/macros/s/AKfycby5t-6XedRhPfIS9B8ln8PNwaxq_MhkLUVjfC2B8pvvXM855zGueT0MaR_xcmHhl5W-/exec"; 
    
    let lastResult = ""; 

    document.addEventListener("DOMContentLoaded", function() {
        const resultContainer = document.getElementById('qr-reader-results');
        const attendeeInput = document.getElementById("attendeeData");
        const submitBtn = document.getElementById("submitBtn");
        
        const html5QrcodeScanner = new Html5QrcodeScanner("qr-reader", { fps: 10, qrbox: 250 });
        
        function onScanSuccess(decodedText) {
            if (decodedText !== lastResult) {
                lastResult = decodedText; 
                resultContainer.innerHTML = `<span class="text-success">Code Captured!</span>`;
                attendeeInput.value = decodedText;
                submitBtn.disabled = false;
                submitBtn.classList.remove("btn-success");
                submitBtn.classList.add("btn-primary");
            }
        }
        html5QrcodeScanner.render(onScanSuccess);

        document.getElementById('CheckinForm').addEventListener('submit', function(e) {
          e.preventDefault();
          
          submitBtn.innerHTML = '<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span> Sending...';
          submitBtn.disabled = true;

          const payload = {
            day: document.getElementById('dayData').value,
            session: document.getElementById('sessionData').value,
            qr_data: attendeeInput.value
          };

          // THE FIX: Grabbing raw text first to catch Google's HTML login/error pages
          fetch(API_URL, {
            method: 'POST',
            body: JSON.stringify(payload),
            headers: { 'Content-Type': 'text/plain;charset=utf-8' }
          })
          .then(response => response.text()) 
          .then(rawText => {
            let data;
            try {
                data = JSON.parse(rawText);
            } catch (err) {
                alert("Google Blocked Connection: Make sure deployment is set to 'Anyone' and Authorized.");
                console.error("RAW HTML FROM GOOGLE:", rawText);
                submitBtn.innerHTML = "Check In Attendee";
                submitBtn.disabled = false;
                lastResult = "";
                return;
            }

            if(data.status === "error") {
                alert("Error: " + data.message); 
                submitBtn.innerHTML = "Check In Attendee";
                submitBtn.disabled = false;
                lastResult = ""; 
                return;
            }

            resultContainer.innerHTML = `<span class="text-info">Scan #${data.order} Saved to Line ${data.row}. Ready for next.</span>`;
            
            const currentDay = document.getElementById('dayData').value;
            const currentSession = document.getElementById('sessionData').value;
            
            document.getElementById('CheckinForm').reset();
            
            document.getElementById('dayData').value = currentDay;
            document.getElementById('sessionData').value = currentSession;
            
            submitBtn.innerHTML = "Check In Attendee";
            lastResult = ""; 
          })
          .catch(error => {
            alert("Network failure. Check your internet connection.");
            submitBtn.innerHTML = "Check In Attendee";
            submitBtn.disabled = false;
            lastResult = "";
          });
        });
    });
  </script>
</body>
</html>
